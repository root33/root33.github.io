<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="description" content="">
    <meta name="author" content="">
    <link rel="icon" href="/docs/4.0/assets/img/favicons/favicon.ico">

    <title>Manaswini Arts</title>

    <!-- Bootstrap CSS (v4.0.0) -->
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css"
        integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        .custom-handwriting {
            /* Uses available cursive handwriting system fonts */
            font-family: "Comic Sans MS", "Comic Sans", "Chalkboard SE", "Caveat", cursive !important;
        }

        /* CUSTOM FIXES: Provides Bootstrap 5 utility rules to your Bootstrap 4 setup */
        .fs-1 { font-size: 2.5rem !important; }
        .lh-1 { line-height: 1 !important; }
        .gap-3 > div { margin-left: 0.75rem; margin-right: 0.75rem; }

        /* Modern Footer Styling */
        .custom-footer {
            background-color: #f8f9fa;
            border-top: 1px solid #e9ecef;
            padding: 2.5rem 0;
        }

        .social-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background-color: #ffffff;
            color: #495057;
            font-size: 1.2rem;
            margin: 0 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
            text-decoration: none !important;
        }

        /* Interactive Brand Hover Colors */
        .social-link.fb:hover { background-color: #1877f2; color: #ffffff; transform: translateY(-3px); }
        .social-link.yt:hover { background-color: #ff0000; color: #ffffff; transform: translateY(-3px); }
        .social-link.ig:hover { background-color: #e1306c; color: #ffffff; transform: translateY(-3px); }
        
        .footer-copyright {
            font-size: 0.85rem;
            color: #6c757d;
        }
    </style>

</head>

<body>
<main role="main">
    <section class="jumbotron text-dark bg-light">
        <div class="container">
            <div class="row justify-content-center align-items-center">
                <div class="col">
                    <h1 class="jumbotron-heading text-center" style="color: blue;">ManaSwini Arts</h1>
                    <div class="text-center">
                        <h5 class="my-3">COMING SOON on May 25th, 2026 at 1:00 PM EST</h5>
                    </div>
                    
                    <!-- Centered Container for Split Units -->
                    <div id="countdown" class="d-flex justify-content-center align-items-center gap-3 text-center text-danger custom-handwriting">
                        <!-- Days -->
                        <div class="d-inline-block mx-2">
                            <div id="days-val" class="fs-1 fw-bold lh-1">00</div>
                            <small class="text-muted text-uppercase fw-normal d-block tracking-wider" style="font-size: 0.75rem; font-family: sans-serif;">Days</small>
                        </div>
                        <!-- Hours -->
                        <div class="d-inline-block mx-2">
                            <div id="hours-val" class="fs-1 fw-bold lh-1">00</div>
                            <small class="text-muted text-uppercase fw-normal d-block tracking-wider" style="font-size: 0.75rem; font-family: sans-serif;">Hours</small>
                        </div>
                        <!-- Minutes -->
                        <div class="d-inline-block mx-2">
                            <div id="mins-val" class="fs-1 fw-bold lh-1">00</div>
                            <small class="text-muted text-uppercase fw-normal d-block tracking-wider" style="font-size: 0.75rem; font-family: sans-serif;">Minutes</small>
                        </div>
                        <!-- Seconds -->
                        <div class="d-inline-block mx-2">
                            <div id="secs-val" class="fs-1 fw-bold lh-1">00</div>
                            <small class="text-muted text-uppercase fw-normal d-block tracking-wider" style="font-size: 0.75rem; font-family: sans-serif;">Seconds</small>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </section>

    <div>
        <img src="images/flyer.jpg" alt="" class="img-fluid mx-auto d-block">
    </div>
</main>

    <footer class="custom-footer mt-5">
        <div class="container text-center">
            <!-- Icon Container Section -->
            <div class="mb-4">
                <a class="social-link fb" target="_blank" href="https://www.facebook.com" aria-label="Facebook">
                    <i class="fab fa-facebook-f"></i>
                </a>
                <a class="social-link yt" target="_blank" href="https://www.youtube.com" aria-label="YouTube">
                    <i class="fab fa-youtube"></i>
                </a>
                <a class="social-link ig" target="_blank" href="https://www.instagram.com" aria-label="Instagram">
                    <i class="fab fa-instagram"></i>
                </a>
            </div>
            
            <!-- Dynamic Copyright Text -->
            <p class="footer-copyright mb-0">&copy; <script>document.write(new Date().getFullYear())</script> ManaSwini Arts. All rights reserved.</p>
        </div>
    </footer>

    <!-- JavaScript Countdown Logic -->
    <script>
        // Set the target date to May 25, 1:00 PM EST (EDT is UTC-4 in May)
        const targetDate = new Date("2026-05-25T13:00:00-04:00").getTime();

        function updateCountdown() {
            const now = new Date().getTime();
            const difference = targetDate - now;

            // Format helper function moved to the top so it is accessible throughout the block
            const formatNum = (num) => String(num).padStart(2, '0');

            // If the countdown is finished, display a message
            if (difference < 0) {
                document.getElementById("countdown").innerHTML = "<h3>EVENT STARTED</h3>";
                clearInterval(timerInterval);
                return;
            }

            // Time calculations for days, hours, minutes, and seconds
            const days = Math.floor(difference / (1000 * 60 * 60 * 24));
            const hours = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((difference % (1000 * 60)) / 1000);

            // FIX: Target each inner block label natively instead of using innerHTML string replacement
            document.getElementById("days-val").innerText = formatNum(days);
            document.getElementById("hours-val").innerText = formatNum(hours);
            document.getElementById("mins-val").innerText = formatNum(minutes);
            document.getElementById("secs-val").innerText = formatNum(seconds);
        }

        // Update the countdown every 1 second
        const timerInterval = setInterval(updateCountdown, 1000);

        // Run immediately on page load to prevent a 1-second display delay
        updateCountdown();
    </script>

</body>
</html>
